name: My_RDP
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Setting Up
      continue-on-error: true
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        net user runneradmin Password123! /add
        net localgroup administrators runneradmin /add
    - name: Connect to Ngrok
      run: |
        # تحميل نجروك برابط مباشر ومستقر
        curl -L -o ngrok.zip https://bin.equinox.io/c/b34edq6tiW5/ngrok-v3-stable-windows-amd64.zip
        Expand-Archive ngrok.zip
        ./ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        Start-Process ./ngrok.exe -ArgumentList "tcp 3389"
    - name: Get RDP Details
      run: |
        Start-Sleep -Seconds 15
        $response = Invoke-RestMethod -Uri http://localhost:4040/api/tunnels
        Write-Host "--- بيانات الدخول ---"
        Write-Host "IP: $($response.tunnels.public_url)"
        Write-Host "User: runneradmin"
        Write-Host "Pass: Password123!"
        Write-Host "--------------------"
        Start-Sleep -Seconds 21600
