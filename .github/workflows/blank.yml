name: My_RDP
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Setting Up
      continue-on-error: true
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        net user runneradmin Password123! /add
        net localgroup administrators runneradmin /add
    - name: Connect to Ngrok
      run: |
        Invoke-WebRequest https://bin.equinox.io/c/b34edq6tiW5/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip
        ./ngrok/ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        Start-Process ./ngrok/ngrok.exe -ArgumentList "tcp 3389"
    - name: Ready!
      run: |
        $ErrorActionPreference = 'SilentlyContinue'
        Start-Sleep -Seconds 10
        $response = Invoke-RestMethod -Uri http://localhost:4040/api/tunnels
        Write-Host "URL: $($response.tunnels.public_url)"
        Write-Host "User: runneradmin"
        Write-Host "Pass: Password123!"
        Start-Sleep -Seconds 21600
